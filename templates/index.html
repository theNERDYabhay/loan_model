<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;user-select:none}
input,textarea{user-select:text}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;background:linear-gradient(135deg,#2563eb,#7c3aed);overflow-x:hidden}
body:before,body:after{content:"";position:fixed;border-radius:50%;filter:blur(60px);z-index:-1}
body:before{width:320px;height:320px;background:#ffffff20;top:-80px;left:-80px}
body:after{width:360px;height:360px;background:#ec489920;right:-100px;bottom:-100px}
.container{display:grid;grid-template-columns:1fr 470px;gap:50px;max-width:1150px;width:100%}
.left{color:#fff}
.left h1{font-size:clamp(2.5rem,5vw,4rem);margin-bottom:20px}
.left p{line-height:1.8;opacity:.95;margin-bottom:25px}
.feature{display:flex;align-items:center;gap:10px;margin:14px 0}
.feature i{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#ffffff20}
.card{background:rgba(255,255,255,.12);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.25);border-radius:24px;padding:35px;box-shadow:0 20px 45px rgba(0,0,0,.25)}
.card h2{text-align:center;color:#fff;margin-bottom:20px}
.group{margin-bottom:18px}
label{display:block;color:#fff;margin-bottom:8px}
.box{position:relative}
.box i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#fff}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{appearance:textfield;-moz-appearance:textfield}
.box input{width:100%;height:54px;padding:0 16px 0 48px;border-radius:14px;border:1px solid rgba(255,255,255,.2);background:#ffffff12;color:#fff;outline:none}
.box input::placeholder{color:#ddd}
button{width:100%;height:52px;border:none;border-radius:14px;cursor:pointer;font-weight:600}
.predict{background:linear-gradient(90deg,#3b82f6,#9333ea);color:#fff}
.history-btn{margin-top:12px;background:#ffffff20;color:#fff}
.result{margin-top:20px;padding:16px;background:#ffffff15;border-radius:12px;color:#fff;text-align:center}
.footer{text-align:center;color:#fff;margin-top:18px;font-size:13px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);justify-content:center;align-items:center;padding:20px}
.modal-card{width:100%;max-width:520px;max-height:80vh;overflow:auto;background:rgba(255,255,255,.12);backdrop-filter:blur(18px);border-radius:18px;padding:22px;color:#fff}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.close{background:none;border:none;color:#fff;font-size:28px;width:auto;height:auto}
.item{padding:12px;border-radius:12px;background:#ffffff10;margin-bottom:10px}
@media(max-width:900px){.container{grid-template-columns:1fr}.left{text-align:center}.card{max-width:500px;margin:auto}}
</style>
</head>
<body>
<div class="container">
<div class="left">
<h1>🏦 Smart Loan Approval</h1>
<p>Predict loan approval instantly using a machine learning model.</p>
<div class="feature"><i class="fa-solid fa-bolt"></i>Fast Prediction</div>
<div class="feature"><i class="fa-solid fa-lock"></i>Secure</div>
<div class="feature"><i class="fa-solid fa-brain"></i>CIBIL Optimization</div>
<div class="feature"><i class="fa-solid fa-chart-line"></i>Loan Analytics</div>
</div>
<div class="card">
<h2>Loan Prediction</h2>
<form action="/predict" method="POST" onsubmit="sessionStorage.removeItem('savedPrediction')">
<div class="group"><label>Age</label><div class="box"><i class="fa-regular fa-user"></i><input type="number" name="age" required></div></div>
<div class="group"><label>Income</label><div class="box"><i class="fa-solid fa-indian-rupee-sign"></i><input type="number" step="any" name="income" required></div></div>
<div class="group"><label>Loan Amount</label><div class="box"><i class="fa-solid fa-money-bill-wave"></i><input type="number" step="any" name="loan" required></div></div>
<div class="group"><label>Credit Score</label><div class="box"><i class="fa-solid fa-chart-line"></i><input type="number" name="credit" required></div></div>
<button class="predict" type="submit">Predict Loan Status</button>
<button class="history-btn" type="button" id="openHistory">View My History</button>
</form>
{% if prediction %}
<div class="result">{{ prediction }}</div>
<script>
if(!sessionStorage.getItem("savedPrediction")){
const history=JSON.parse(localStorage.getItem("loanHistory"))||[];
history.unshift({
age:"{{ age }}",
income:"{{ income }}",
loan:"{{ loan }}",
credit:"{{ credit }}",
status:"{{ prediction }}",
time:new Date().toLocaleString()
});
localStorage.setItem("loanHistory",JSON.stringify(history.slice(0,20)));
sessionStorage.setItem("savedPrediction","true");
}
</script>
{% endif %}
<div class="footer">Your data is secure.</div>
</div></div>
<div class="modal" id="modal"><div class="modal-card"><div class="header"><h2>My Prediction History</h2><button class="close" id="close">&times;</button></div><div id="history"></div></div></div>
<script>
const modal=document.getElementById("modal");
document.getElementById("openHistory").onclick=()=>{
modal.style.display="flex";
const data=JSON.parse(localStorage.getItem("loanHistory"))||[];
const list=document.getElementById("history");
list.innerHTML=data.length?data.map(x=>`<div class="item"><b>${x.status}</b><br>Age:${x.age}<br>Income:₹${x.income}<br>Loan:₹${x.loan}<br>Credit:${x.credit}<br><small>${x.time}</small></div>`).join(""):"<p>No history available.</p>";
};
document.getElementById("close").onclick=()=>modal.style.display="none";
window.onclick=e=>{if(e.target===modal)modal.style.display="none";}
document.addEventListener("contextmenu",e=>e.preventDefault());
</script>
</body>
</html>
